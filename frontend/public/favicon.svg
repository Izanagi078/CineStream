<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep dark indigo/purple to black -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c20" />
      <stop offset="100%" stop-color="#06040a" />
    </linearGradient>
    <!-- Accent Gradient: Vibrant Neon Purple/Violet to Pink/Rose -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2387" />
      <stop offset="50%" stop-color="#e94057" />
      <stop offset="100%" stop-color="#f27121" />
    </linearGradient>
    <!-- Play Button Gradient: Cyan to Blue -->
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <!-- Drop Shadow for components -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base shape: Smooth rounded squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Outer Ring: Sleek thin glowing outline -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accent-grad)" stroke-width="8" opacity="0.4" />

  <!-- The stylized C and Play icon combination -->
  <!-- A glowing circular arc representing 'C' -->
  <path d="M 360,140 A 150,150 0 1,0 360,372" 
        fill="none" 
        stroke="url(#accent-grad)" 
        stroke-width="48" 
        stroke-linecap="round" 
        filter="url(#glow)" />

  <!-- Play triangle in the center/right -->
  <path d="M 220,180 L 350,256 L 220,332 Z" 
        fill="url(#play-grad)" 
        filter="url(#glow)" />
</svg>